name: workflows, Jobs, and Steps

on:
  workflow_dispatch:

jobs:
  job-1:
    runs-on: ubuntu-24.04
    steps:
      - run: echo "A job consist of"
      - run: echo "one or more steps"
      - run: echo "which run sequentially"
      - run: echo "within th same compute environment"
  job-2:
    runs-on: ubuntu-24.04
    steps:
      - run: echo "multiple steps can run in parallel"
  job-3:
    runs-on: ubuntu-24.04
    needs:
      - job-1
      - job-2
    steps:
      - run: echo "the can also depend on one another"
  job-4:
    runs-on: ubuntu-24.04
    needs:
      - job-3
    steps:
      - run: echo "...to from a directed acyclic graph (DAG)"
  