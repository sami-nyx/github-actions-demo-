name: Mtrix & conditionals

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix-run:
    
    runs-on: ubuntu-24.04
    strategy:
      max-parrarel: 1
      fail-fast: true
      matrix:
        number: [1 , 2]
        letter: [a, b, c]
        # exclude:
        #   - number: 1
        #   - letter: c
    timeout-minutes: 4

    steps:
      
      - name: Print iteration value
        run: |
          echo "==${{ matrix.number }}-${{ matrix.letter }}=="
      
      - name: Print all except 2-b
        if: ${{ ! ( matrix.number == 2 && matrix.letter == 'b') }}
        run: |
          echo "filterd:"
          echo ">>${{ matrix.number }}-${{ matrix.letter }}<<"
  
  sleep-job:
    runs-on: ubuntu-24.04
    steps:
      - name: Sleep 30s (to give time to be canceled)
        run: |
          echo "sleeping for a while"
          sleep 30